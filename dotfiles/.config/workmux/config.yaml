agent: claude
window_prefix: ''
files:
  copy:
    - packages/*/.env
    - packages/*/.env.debug
    - packages/*/.env.local
    - packages/i18n/dist/
    - packages/main/firebase.json
    - firebase-config.json
sandbox:
  enabled: false
  host_commands: ["yarn"]
  env_passthrough:
    - GITHUB_TOKEN
    - OPENAI_API_KEY
  container: 
    runtime: apple-container
  extra_mounts:
    - ~/.pi/agent/skills
    - ~/.claude
    #- host_path: /tmp
      #guest_path: /tmp
      #writeable: true


# Lima Config
    #- ANTHROPIC_API_KEY
  #extra_mounts:
    #- ~/.pi/agent/skills
  #backend: lima
  #lima:
    #provision: |
      #sudo apt-get install -y ripgrep jq unzip gh
      #curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
      #sudo apt-get install -y nodejs
      #sudo npm install -g @mariozechner/pi-coding-agent

panes:
  - command: clear
  - split: horizontal
    command: yarn install && gen
  - command: <agent>
    split: vertical
    focus: true
nerdfont: false
status_format: false
status_icons:
  working: "W"
  waiting: "..."
  done: "✔"
auto_name:
  #command: claude -p
  system_prompt: |
    Generate a concise git branch name based on the task description.

    Rules:
    - Use kebab-case (lowercase with hyphens)
    - Keep it short: 1-3 words, max 4 if necessary
    - Focus on the core task/feature, not implementation details
    - No prefixes like feat/, fix/, chore/
    - if the prompt is a linear dump prefix the branch name with a lower case Identifier (hoth-123-short-title, prod-123-short-title)

    Output ONLY the branch name, nothing else.
