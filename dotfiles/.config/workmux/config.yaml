agent: claude
window_prefix: ''
files:
  copy:
    - packages/*/.env
    - packages/*/.env.debug
    - packages/*/.env.local
    - packages/i18n/dist/
    - packages/main/firebase.json
    - firebase-config.json
sandbox:
  enabled: false
  host_commands: ["yarn"]
  env_passthrough:
    - GITHUB_TOKEN
    - OPENAI_API_KEY
  container: 
    runtime: apple-container
  extra_mounts:
    - ~/.pi/agent/skills
    - ~/.claude
    #- host_path: /tmp
      #guest_path: /tmp
      #writeable: true


# Lima Config
    #- ANTHROPIC_API_KEY
  #extra_mounts:
    #- ~/.pi/agent/skills
  #backend: lima
  #lima:
    #provision: |
      #sudo apt-get install -y ripgrep jq unzip gh
      #curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
      #sudo apt-get install -y nodejs
      #sudo npm install -g @mariozechner/pi-coding-agent

panes:
  - command: clear
  - split: horizontal
    command: tail -f /tmp/setup-worktree-*.log
  - command: <agent>
    split: vertical
    focus: true
nerdfont: false
status_format: false
status_icons:
  working: "W"
  waiting: "..."
  done: "✔"
auto_name:
  model: gemini-2.5-flash-lite
  system_prompt: |
    You output a single git branch name. Nothing else.

    Your ENTIRE response must be one line: the branch name. Do not think out
    loud, restate the task, explain your choice, or add any preamble, quotes,
    punctuation, or trailing text. The first and only thing you write is the
    branch name itself.

    Rules:
    - kebab-case (lowercase, hyphen-separated)
    - 2-4 words, 40 characters MAX (hard limit)
    - name the core task/feature, not the implementation details
    - no feat/, fix/, chore/ prefixes
    - if the prompt is a Linear dump, prefix with the lowercase identifier:
      hoth-123-short-title, prod-456-short-title

    Examples:
    Task: "I need permission to read that file. Once you grant it I can examine
    the workmux config and help shorten the auto-naming prompt." -> shorten-auto-name-prompt
    Task: "PROD-5259 build a team reporting page for admins" -> prod-5259-team-reporting
